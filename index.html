<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Control Biométrico</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
      padding-top: 100px;
    }

    .card {
      background: white;
      color: #333;
      width: 350px;
      margin: auto;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 10px;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      background-color: #2a5298;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #1e3c72;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: #bbb;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Control Biométrico</h1>
    <p>Sistema de Registro de Accesos</p>

    <a href="registros.csv" download>
      <button>Descargar Registros CSV</button>
    </a>

    <div class="footer">
      Acceso seguro • Sistema IoT
    </div>
  </div>

</body>
</html>
