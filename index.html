<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IMPLACOR - Registros</title>

<style>
body { font-family: Arial; text-align:center; }
button { padding:8px 15px; margin:5px; }
select { padding:5px; }
</style>

</head>
<body>

<h2>Filtrar registros por trabajador</h2>

<button onclick="cargarCSV()">Cargar CSV</button>
<br><br>

<select id="trabajadores"></select>
<button onclick="filtrar()">Ordenar y Descargar</button>

<script>

let datos = [];

async function cargarCSV() {

    const url = "https://raw.githubusercontent.com/202000790-alt/biometrico2/main/registros.csv";
    const response = await fetch(url);
    const text = await response.text();

    datos = text.trim().split("\n").map(line => line.split(","));

    // Asumimos formato:
    // Fecha,Hora,Nombre
    // 0     1     2

    let nombres = [...new Set(datos.slice(1).map(row => row[2]))];

    let select = document.getElementById("trabajadores");
    select.innerHTML = "";

    nombres.forEach(nombre => {
        let option = document.createElement("option");
        option.value = nombre;
        option.text = nombre;
        select.appendChild(option);
    });

    alert("CSV cargado correctamente");
}

function filtrar() {

    let nombre = document.getElementById("trabajadores").value;

    let registros = datos
        .slice(1)
        .filter(row => row[2] === nombre);

    let agrupado = {};

    registros.forEach(row => {

        let fecha = row[0];
        let hora = row[1];

        if (!agrupado[fecha]) {
            agrupado[fecha] = [];
        }

        agrupado[fecha].push(hora);
    });

    let resultado = "Fecha,Ingreso,Almuerzo,Retorno,Salida\n";

    Object.keys(agrupado).sort().forEach(fecha => {

        let horas = agrupado[fecha].sort(); // ordena cronológicamente

        let ingreso  = horas[0] || "";
        let almuerzo = horas[1] || "";
        let retorno  = horas[2] || "";
        let salida   = horas[3] || "";

        resultado += `${fecha},${ingreso},${almuerzo},${retorno},${salida}\n`;
    });

    let blob = new Blob([resultado], { type: "text/csv" });
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = nombre + "_ordenado.csv";
    link.click();
}

</script>

</body>
</html>
